version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: nisms-db
    environment:
      POSTGRES_USER: nisms
      POSTGRES_PASSWORD: nisms
      POSTGRES_DB: nisms
    ports:
      - "5432:5432"
    volumes:
      - nisms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nisms"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nisms_pgdata:
